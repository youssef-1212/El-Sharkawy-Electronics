const Reserve = ({ products, addReservation, preselect, notify }) => {
  const [name, setName] = useState('');
  const [phone, setPhone] = useState('');
  const [productId, setProductId] = useState(preselect || '');
  const [errors, setErrors] = useState({});

  useEffect(()=>{ if (preselect) setProductId(preselect); }, [preselect]);

  const available = products.filter(p => statusOf(p.qty) !== 'Out of Stock');

  const validate = () => {
    const e = {};
    if (!name.trim() || name.trim().length < 2) e.name = 'Enter the customer\'s full name.';
    if (!/^01[0125][0-9]{8}$/.test(phone.trim())) e.phone = 'Enter a valid Egyptian phone number (e.g. 01210098086).';
    if (!productId) e.product = 'Choose a product to reserve.';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = (ev) => {
    ev.preventDefault();
    if (!validate()) return;
    const product = products.find(p=>p.id===productId);
    addReservation({ id:'r'+Date.now(), name:name.trim(), phone:phone.trim(), productId, productName:product.name, createdAt:new Date().toISOString(), status:'Pending' });
    setName(''); setPhone(''); setProductId('');
    notify('Reservation sent — we\'ll confirm by phone shortly.', 'success');
  };

  return (
    <div className="max-w-2xl mx-auto px-5 sm:px-8 py-14">
      <div className="text-xs font-mono text-teal tracking-[0.16em] uppercase mb-2">Hold an item</div>
      <h1 className="font-display text-3xl sm:text-4xl font-700 mb-3">Reserve a product</h1>
      <p className="text-mute mb-9">Tell us what you need and we'll set it aside. No payment now — just bring ID and cash or card when you pick it up.</p>

      <form onSubmit={submit} className="rounded-2xl border border-line bg-panel p-6 sm:p-8 flex flex-col gap-5">
        <div>
          <label className="block text-sm font-medium mb-1.5">Customer name</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Mohamed Ahmed"
            className={`focus-ring w-full bg-panel2 border rounded-xl px-4 py-2.5 text-sm placeholder:text-mute ${errors.name ? 'border-red' : 'border-line'}`} />
          {errors.name && <div className="text-xs text-red mt-1.5">{errors.name}</div>}
        </div>
        <div>
          <label className="block text-sm font-medium mb-1.5">Phone number</label>
          <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="01XXXXXXXXX" inputMode="numeric"
            className={`focus-ring w-full bg-panel2 border rounded-xl px-4 py-2.5 text-sm font-mono placeholder:text-mute placeholder:font-body ${errors.phone ? 'border-red' : 'border-line'}`} />
          {errors.phone && <div className="text-xs text-red mt-1.5">{errors.phone}</div>}
        </div>
        <div>
          <label className="block text-sm font-medium mb-1.5">Product</label>
          <select value={productId} onChange={e=>setProductId(e.target.value)}
            className={`focus-ring w-full bg-panel2 border rounded-xl px-4 py-2.5 text-sm ${errors.product ? 'border-red' : 'border-line'}`}>
            <option value="">Select a product…</option>
            {available.map(p => (
              <option key={p.id} value={p.id}>{p.name} — {fmtEGP(p.price)} ({statusOf(p.qty)})</option>
            ))}
          </select>
          {errors.product && <div className="text-xs text-red mt-1.5">{errors.product}</div>}
        </div>
        <button type="submit" className="focus-ring mt-2 bg-amber text-ink font-semibold py-3 rounded-xl hover:bg-amberD transition-colors">
          Reserve now
        </button>
        <p className="text-xs text-mute text-center">By reserving you agree we'll call this number to confirm pickup details.</p>
      </form>
    </div>
  );
};

const AdminProducts = ({ products, setProducts, notify }) => {
  const [form, setForm] = useState({ name:'', category:'Laptops', qty:'', price:'' });
  const categories = ['Laptops','Desktop PCs','Monitors','Keyboards','SSD Drives'];

  const addProduct = (e) => {
    e.preventDefault();
    if (!form.name.trim() || form.qty === '' || form.price === '') { notify('Fill in name, quantity and price.', 'error'); return; }
    const np = { id:'p'+Date.now(), name:form.name.trim(), category:form.category, qty: Number(form.qty), price: Number(form.price) };
    const next = [np, ...products];
    setProducts(next); saveProducts(next);
    setForm({ name:'', category:'Laptops', qty:'', price:'' });
    notify('Product added.', 'success');
  };

  const updateQty = (id, delta) => {
    const next = products.map(p => p.id===id ? { ...p, qty: Math.max(0, p.qty + delta) } : p);
    setProducts(next); saveProducts(next);
  };
  const setQtyDirect = (id, val) => {
    const next = products.map(p => p.id===id ? { ...p, qty: Math.max(0, Number(val)||0) } : p);
    setProducts(next); saveProducts(next);
  };
  const removeProduct = (id) => {
    const next = products.filter(p=>p.id!==id);
    setProducts(next); saveProducts(next);
    notify('Product removed.', 'success');

    <div className="flex flex-col gap-8">

                </td>
                <td className="px-5 py-3.5 text-right">
                  <button onClick={()=>remove(r.id)} className="focus-ring text-mute hover:text-red p-1.5"><Icon name="trash" className="w-4 h-4"/></button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const Admin = ({ products, setProducts, reservations, setReservations, notify }) => {
  const [authed, setAuthed] = useState(false);
  const [tab, setTab] = useState('products');

  if (!authed) return <AdminLogin onLogin={()=>setAuthed(true)} />;

  return (
    <div className="max-w-6xl mx-auto px-5 sm:px-8 py-14">
      <div className="flex items-start justify-between flex-wrap gap-4 mb-8">
        <div>
          <div className="text-xs font-mono text-teal tracking-[0.16em] uppercase mb-2">Staff dashboard</div>
          <h1 className="font-display text-3xl sm:text-4xl font-700">Admin</h1>
        </div>
        <button onClick={()=>setAuthed(false)} className="focus-ring flex items-center gap-2 text-sm text-mute hover:text-paper border border-line rounded-lg px-3.5 py-2">
          <Icon name="logout" className="w-4 h-4"/> Sign out
        </button>
      </div>

      <div className="flex gap-2 mb-8 border-b border-line">
        {[
          {id:'products', label:`Products (${products.length})`},
          {id:'reservations', label:`Reservations (${reservations.length})`},
        ].map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`focus-ring px-4 py-2.5 text-sm font-medium border-b-2 -mb-px transition-colors ${tab===t.id ? 'border-amber text-paper' : 'border-transparent text-mute hover:text-paper'}`}>
            {t.label}
          </button>
        ))}
      </div>

      {tab==='products'
        ? <AdminProducts products={products} setProducts={setProducts} notify={notify} />
        : <AdminReservations reservations={reservations} setReservations={setReservations} notify={notify} />}
    </div>
  );
};

/* ---------------------------------------------------------
   APP ROOT
--------------------------------------------------------- */
const App = () => {
  const [page, setPage] = useState('home');
  const [products, setProducts] = useState([]);
  const [reservations, setReservations] = useState([]);
  const [preselect, setPreselect] = useState('');
  const [toast, setToast] = useState(null);

  useEffect(() => {
    setProducts(loadProducts());
    setReservations(loadReservations());
  }, []);

  const notify = (msg, type='success') => {
    setToast({ msg, type });
    clearTimeout(window.__esToast);
    window.__esToast = setTimeout(()=>setToast(null), 3200);
  };

  const addReservation = (r) => {
    const next = [...reservations, r];
    setReservations(next); saveReservations(next);
  };

  let body;
  if (page==='home') body = <Home setPage={setPage} products={products} />;
  else if (page==='products') body = <Products products={products} setPage={setPage} setPreselect={setPreselect} />;
  else if (page==='reserve') body = <Reserve products={products} addReservation={addReservation} preselect={preselect} notify={notify} />;
  else if (page==='contact') body = <Contact />;
  else if (page==='admin') body = <Admin products={products} setProducts={setProducts} reservations={reservations} setReservations={setReservations} notify={notify} />;

  return (
    <div className="min-h-screen flex flex-col">
      <Nav page={page} setPage={setPage} />
      <main className="flex-1">{body}</main>
      <Footer setPage={setPage} />
      <Toast toast={toast} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
